AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM baseline — deploys least-privilege managed policies and IAM users for
  three personas: auditor (read-only), admin (with guardrails), developer (S3-scoped).
  Maps to CIS AWS Benchmark 1.x and SOC 2 CC6.x controls.

  NOTE: IAM account password policy cannot be set via CloudFormation natively.
  Apply it separately using the AWS CLI command documented in engineering/README.md.

Parameters:
  NamePrefix:
    Type: String
    Default: cfn-
    Description: >
      Prefix applied to all resource names. Use "cfn-" to deploy alongside
      manually-created resources for comparison. Use "" (empty) for a clean account.

  AuditorPassword:
    Type: String
    NoEcho: true
    MinLength: 14
    Description: Initial console password for the auditor user

  AdminPassword:
    Type: String
    NoEcho: true
    MinLength: 14
    Description: Initial console password for the admin user

  DevPassword:
    Type: String
    NoEcho: true
    MinLength: 14
    Description: Initial console password for the developer user

  DevBucketName:
    Type: String
    Default: dev-application-bucket-REPLACE-ME
    Description: S3 bucket name the developer user is permitted to access

Resources:

  # ── Managed Policies ──────────────────────────────────────────────────────

  AuditorReadonlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    # CIS 1.16 — least privilege; SOC 2 CC6.3 — logical access controls
    Properties:
      ManagedPolicyName: !Sub '${NamePrefix}auditor-readonly'
      Description: Read-only access for auditors with explicit deny on all write actions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowReadOnlyAccess
            Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
              - iam:GenerateCredentialReport
              - iam:GenerateServiceLastAccessedDetails
              - s3:Get*
              - s3:List*
              - cloudtrail:Get*
              - cloudtrail:List*
              - cloudtrail:Describe*
              - cloudtrail:LookupEvents
              - cloudwatch:Get*
              - cloudwatch:List*
              - cloudwatch:Describe*
              - config:Get*
              - config:List*
              - config:Describe*
              - config:BatchGetResourceConfig
              - ec2:Describe*
              - logs:Get*
              - logs:List*
              - logs:Describe*
              - logs:FilterLogEvents
            Resource: '*'
          - Sid: DenyAllWrites
            # Explicit deny overrides any Allow — safe to attach alongside other policies
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachUserPolicy
              - iam:DetachUserPolicy
              - iam:PutUserPolicy
              - iam:DeleteUserPolicy
              - iam:CreateAccessKey
              - iam:DeleteAccessKey
              - iam:UpdateAccessKey
              - s3:PutObject
              - s3:DeleteObject
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - cloudtrail:CreateTrail
              - cloudtrail:DeleteTrail
              - cloudtrail:StopLogging
              - cloudtrail:UpdateTrail
              - config:DeleteConfigRule
              - config:StopConfigurationRecorder
            Resource: '*'

  DeveloperS3LimitedPolicy:
    Type: AWS::IAM::ManagedPolicy
    # CIS 1.16 — resource-level least privilege (specific bucket ARN, not wildcard)
    Properties:
      ManagedPolicyName: !Sub '${NamePrefix}developer-s3-limited'
      Description: S3 access scoped to a specific bucket with explicit deny on security services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3AccessToSpecificBucket
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:aws:s3:::${DevBucketName}'
              - !Sub 'arn:aws:s3:::${DevBucketName}/*'
          - Sid: AllowCloudWatchLogsRead
            Effect: Allow
            Action:
              - logs:GetLogEvents
              - logs:FilterLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource: '*'
          - Sid: DenySecurityInfrastructure
            # Developers have no business touching IAM, CloudTrail, Config, or Organizations
            Effect: Deny
            Action:
              - iam:*
              - cloudtrail:*
              - config:*
              - organizations:*
              - account:*
            Resource: '*'

  AdminWithGuardrailsPolicy:
    Type: AWS::IAM::ManagedPolicy
    # CIS 3.2 — protect audit logs; CIS 4.1 — region restriction
    Properties:
      ManagedPolicyName: !Sub '${NamePrefix}admin-with-guardrails'
      Description: Admin access with tamper-resistant guardrails on audit controls and region lock
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAdminAccess
            Effect: Allow
            Action: '*'
            Resource: '*'
          - Sid: DenyAuditControlTampering
            # Prevents even a compromised admin credential from disabling detective controls
            Effect: Deny
            Action:
              - cloudtrail:DeleteTrail
              - cloudtrail:StopLogging
              - cloudtrail:UpdateTrail
              - config:DeleteConfigRule
              - config:DeleteConfigurationRecorder
              - config:DeleteDeliveryChannel
              - config:StopConfigurationRecorder
              - guardduty:DeleteDetector
              - guardduty:DisassociateFromMasterAccount
              - securityhub:DisableSecurityHub
            Resource: '*'
          - Sid: DenyActionsOutsideUsEast1
            # Region lock — all activity stays in one region where audit logs are monitored
            Effect: Deny
            Action: '*'
            Resource: '*'
            Condition:
              StringNotEquals:
                aws:RequestedRegion: us-east-1

  # ── IAM Users ─────────────────────────────────────────────────────────────

  AuditorUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${NamePrefix}auditor'
      LoginProfile:
        Password: !Ref AuditorPassword
        PasswordResetRequired: true
      ManagedPolicyArns:
        - !Ref AuditorReadonlyPolicy

  AdminUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${NamePrefix}admin'
      LoginProfile:
        Password: !Ref AdminPassword
        PasswordResetRequired: true
      ManagedPolicyArns:
        - !Ref AdminWithGuardrailsPolicy

  DevUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub '${NamePrefix}dev'
      LoginProfile:
        Password: !Ref DevPassword
        PasswordResetRequired: true
      ManagedPolicyArns:
        - !Ref DeveloperS3LimitedPolicy

Outputs:

  AuditorUserArn:
    Description: ARN of the auditor IAM user
    Value: !GetAtt AuditorUser.Arn

  AdminUserArn:
    Description: ARN of the admin IAM user
    Value: !GetAtt AdminUser.Arn

  DevUserArn:
    Description: ARN of the developer IAM user
    Value: !GetAtt DevUser.Arn

  AuditorPolicyArn:
    Description: ARN of the auditor-readonly managed policy
    Value: !Ref AuditorReadonlyPolicy

  AdminPolicyArn:
    Description: ARN of the admin-with-guardrails managed policy
    Value: !Ref AdminWithGuardrailsPolicy

  DevPolicyArn:
    Description: ARN of the developer-s3-limited managed policy
    Value: !Ref DeveloperS3LimitedPolicy
